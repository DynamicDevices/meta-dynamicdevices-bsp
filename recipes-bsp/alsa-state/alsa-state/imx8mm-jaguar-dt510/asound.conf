# DT510 — ALSA overlays: TAA5412 (“Driver Mic”), TAC5301 loop/aux, TAS6424 (“Tannoy”), TAS2563 driver speaker.
#
# ── TAS2563 (`&sai3`, Profile‑8 TDM; DTS **`ti,channels = <1>`** mono — one differential speaker; **`ti,left-slot = <0>`**).
# Card short id from `simple-audio-card,name = "tas2563-audio"` → tas2563audio
#
#   aplay -D driver_speaker /path.wav    # plug → raw hw (usual mono apps)
#   aplay -D drivers                     # raw card params
#   aplay -D driver_slot | driver_out    # IEC slot 0 (`ti,left-slot`) ↔ schematic OUT naming — same route
#   amixer -D drivers …                   # TI kcontrols (optional: amixer -D driver_slot …)
#

pcm.drivers {
	type hw
	card tas2563audio
	device 0
}

ctl.drivers {
	type hw
	card tas2563audio
}

ctl.driver_slot {
	type hw
	card tas2563audio
}

ctl.driver_out {
	type hw
	card tas2563audio
}

# Raw 4-open TDM view for route slaves (omit `channels 4` if `aplay -D drivers` proves single-channel only).
pcm._tas2563_tdm {
	type hw
	card tas2563audio
	device 0
	channels 4
}

# Mono → IEC slot 0 (`ti,left-slot`); single physical differential OUT — schematic-facing duplicate below.
pcm.driver_slot {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas2563_tdm"
		slave.channels 4
		ttable.0.0 1
	}
}

pcm.driver_out {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas2563_tdm"
		slave.channels 4
		ttable.0.0 1
	}
}

pcm.driver_speaker {
	type plug
	slave.pcm "drivers"
}

# ── TAC5301 (`audio_loop` / `aux`) — tac5301codec
#
#   simple-audio-card,name = "tac5301-codec" → short ALSA card id tac5301codec
#   Playback (vehicle / cabin analogue **loop output** — typical **passenger channel** in AVM):
#     aplay -D audio_loop …
#   **`tannoy_*`** (TAS6424) stays the alternate passenger sink when PA horns should carry announcements.
#   Capture (reserved aux input): arecord -D aux …       # wrong direction rejected by asym helper
#

pcm._tac5301_hw {
	type hw
	card tac5301codec
	device 0
}

pcm.audio_loop {
	type asym
	playback.pcm {
		type plug
		slave.pcm "_tac5301_hw"
	}
	capture.pcm "null"
}

pcm.aux {
	type asym
	playback.pcm "null"
	capture.pcm {
		type plug
		slave.pcm "_tac5301_hw"
	}
}

ctl.audio_loop {
	type hw
	card tac5301codec
}

ctl.aux {
	type hw
	card tac5301codec
}

# ── TAA5412 (“Driver Mic”) — taa5412codec  (PCM6240 / snd_soc_pcm6240; MACHINE_FEATURES taa5412 + firmware blob)
#
#   simple-audio-card,name = "taa5412-codec" → short id taa5412codec
#   SSOT analog: IN1 / IN2 = two differential mic inputs → ALSA capture ch 0 / ch 1 on this PCM (validate on HW).
#
#   arecord -D driver_mic …           # stereo (both IN1+IN2 when HW exposes 2ch)
#   arecord -D driver_mic_in1 …       # mono — slot / ALSA ch 0 only (= IN1)
#   arecord -D driver_mic_in2 …       # mono — ALSA ch 1 only (= IN2)
#   arecord -D driver_mic_slot0 …     # alias of driver_mic_in1 (IEC-style naming)
#   arecord -D driver_mic_slot1 …     # alias of driver_mic_in2
#

pcm._taa5412_hw {
	type hw
	card taa5412codec
	device 0
}

# Stereo capture path (both wired mic channels when PCM is 2‑wide).
pcm.driver_mic {
	type asym
	playback.pcm "null"
	capture.pcm {
		type plug
		slave.pcm "_taa5412_hw"
	}
}

# Mono capture from one ALSA channel via route (slave assumed ≥2 ch for IN1/IN2 mapping).
pcm.driver_mic_in1 {
	type asym
	playback.pcm "null"
	capture.pcm {
		type plug
		slave.pcm {
			type route
			slave.pcm "_taa5412_hw"
			slave.channels 2
			ttable.0.0 1
		}
	}
}

pcm.driver_mic_in2 {
	type asym
	playback.pcm "null"
	capture.pcm {
		type plug
		slave.pcm {
			type route
			slave.pcm "_taa5412_hw"
			slave.channels 2
			ttable.0.1 1
		}
	}
}

pcm.driver_mic_slot0 {
	type asym
	playback.pcm "null"
	capture.pcm {
		type plug
		slave.pcm {
			type route
			slave.pcm "_taa5412_hw"
			slave.channels 2
			ttable.0.0 1
		}
	}
}

pcm.driver_mic_slot1 {
	type asym
	playback.pcm "null"
	capture.pcm {
		type plug
		slave.pcm {
			type route
			slave.pcm "_taa5412_hw"
			slave.channels 2
			ttable.0.1 1
		}
	}
}

ctl.driver_mic {
	type hw
	card taa5412codec
}

ctl.driver_mic_in1 {
	type hw
	card taa5412codec
}

ctl.driver_mic_in2 {
	type hw
	card taa5412codec
}

ctl.driver_mic_slot0 {
	type hw
	card taa5412codec
}

ctl.driver_mic_slot1 {
	type hw
	card taa5412codec
}

# ── TAS6424 (`tannoy_*`) — tas6424classd
#
# DT510 — TAS6424 class-D; ALSA card short id: tas6424classd
#
# IEC slots 2–3 = product Tannoy pair — schematic OUT2 / OUT3 on this board; slots 0–1 unused (no PCMs for 0–1).
#
#   aplay -D tannoy_slot2 | tannoy_out2     # one Tannoy each (IEC slot 2 = OUT2)
#   aplay -D tannoy_slot3 | tannoy_out3     # IEC slot 3 = OUT3
#   TAS6424 / SAI path is 48 kHz — outer **plug** sets **slave.rate 48000** so route→hw
#   always sees 48 kHz (e.g. ring.wav 22050 stereo via aplay resamples; hw alone fails).
#   aplay -D tannoy_both_mono | tannoy_both_lr   # both Tannoys (mono dup / stereo L→2 R→3)
#   aplay -D tannoy_all                  # mono → all four IEC slots (incl. 0–1; lab only)
#   aplay -D tannoys                     # raw 4-open hw
#   amixer -D tannoys                    # TI mixer control names (use tannoy_out* ctl aliases below if preferred)

pcm.tannoys {
	type hw
	card tas6424classd
	device 0
}

ctl.tannoys {
	type hw
	card tas6424classd
}

pcm._tas6424_quad {
	type hw
	card tas6424classd
	device 0
	channels 4
}

# Rate converter: TAS6424 IEC958 hw only accepts 44100–96000; plug alone does not resample through route+hw.
pcm._tas6424_quad_48 {
	type rate
	slave {
		pcm "_tas6424_quad"
		rate 48000
	}
}

pcm.tannoy_slot2 {
	type plug
	slave.rate 48000
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad_48"
		slave.channels 4
		ttable.0.2 1
	}
}

pcm.tannoy_slot3 {
	type plug
	slave.rate 48000
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad_48"
		slave.channels 4
		ttable.0.3 1
	}
}

# Schematic-facing aliases — same route / IEC indices as tannoy_slot2|slot3 (OUT2 ↔ slot 2, OUT3 ↔ slot 3).
pcm.tannoy_out2 {
	type plug
	slave.rate 48000
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad_48"
		slave.channels 4
		ttable.0.2 1
	}
}

pcm.tannoy_out3 {
	type plug
	slave.rate 48000
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad_48"
		slave.channels 4
		ttable.0.3 1
	}
}

pcm.tannoy_all {
	type plug
	slave.rate 48000
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad_48"
		slave.channels 4
		ttable.0.0 1
		ttable.0.1 1
		ttable.0.2 1
		ttable.0.3 1
	}
}

pcm.tannoy_both_mono {
	type plug
	slave.rate 48000
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad_48"
		slave.channels 4
		ttable.0.2 1
		ttable.0.3 1
	}
}

# tannoy_both_lr: ALSA consumes **two input channels** (L→IEC slot 2, R→IEC 3).
# Container AVM (**audio_player**) feeds **mono** passenger PCM duplicated to stereo L+R
# (**aplay -c 2** or PyAudio channels=2) so behaviour matches tannoy_both_mono until apps send true stereo.
pcm.tannoy_both_lr {
	type plug
	slave.rate 48000
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad_48"
		slave.channels 4
		ttable.0.2 1
		ttable.1.3 1
	}
}

ctl.tannoy_out2 {
	type hw
	card tas6424classd
}

ctl.tannoy_out3 {
	type hw
	card tas6424classd
}
