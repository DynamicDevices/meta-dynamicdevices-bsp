# DT510 — TAS6424 class-D (DTS: simple-audio-card,name = "tas6424-classd")
# ALSA short card id in /proc/asound/cards is tas6424classd (no hyphen).
#
# 4-open IEC stream: per-slot PCM is always **tannoy_slot0 … tannoy_slot3** (= IEC indices 0–3).
# On this DT510 wiring, slots **0–1** have no acoustic load; slots **2–3** drive the Tannoys.
#
# Individual slots:
#   aplay -D tannoy_slotN path.wav   # N ∈ {0,1,2,3}
#
# All four slots together (mono input duplicated to IEC 0–3; use mono WAV):
#   aplay -D tannoy_all path.wav
#
# Tannoy pair only (IEC 2 + 3, no energy on slots 0–1):
#   aplay -D tannoy_both_mono path.wav
#   aplay -D tannoy_both_lr path.wav   # stereo WAV: L→2, R→3
#
# Raw 4-open:   aplay -D tannoys …
# Mixer (TI names): amixer -D tannoys …
# ctl.!default unchanged (multiple cards on DT510).

pcm.tannoys {
	type hw
	card tas6424classd
	device 0
}

ctl.tannoys {
	type hw
	card tas6424classd
}

pcm._tas6424_quad {
	type hw
	card tas6424classd
	device 0
	channels 4
}

pcm.tannoy_slot0 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.0 1
	}
}

pcm.tannoy_slot1 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.1 1
	}
}

pcm.tannoy_slot2 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.2 1
	}
}

pcm.tannoy_slot3 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.3 1
	}
}

pcm.tannoy_all {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.0 1
		ttable.0.1 1
		ttable.0.2 1
		ttable.0.3 1
	}
}

pcm.tannoy_both_mono {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.2 1
		ttable.0.3 1
	}
}

pcm.tannoy_both_lr {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.2 1
		ttable.1.3 1
	}
}
