# DT510 — ALSA overlays: TAA5412 (“Driver Mic”), TAC5301 loop/aux, TAS6424 (“Tannoy”), TAS2563 driver speaker.
#
# ── TAS2563 (`&sai3`, Profile‑8 TDM, mono `ti,channels`; DTS `ti,left-slot` 0 / `ti,right-slot` 1).
# Card short id from `simple-audio-card,name = "tas2563-audio"` → tas2563audio
#
#   aplay -D driver_speaker /path.wav    # plug — usual app/default-style open (driver-facing mono path)
#   aplay -D drivers                     # raw card params (often TDM-capable PCM)
#   aplay -D driver_slot0 | driver_slot1 # route 1→TDM IEC slot per DTS naming (needs 4ch hw)
#   aplay -D driver_slots_lr             # stereo file: L→slot0 R→slot1 (lab / mux experiments)
#   amixer -D drivers …                   # TI kcontrols (see tas2563-init)
#

pcm.drivers {
	type hw
	card tas2563audio
	device 0
}

ctl.drivers {
	type hw
	card tas2563audio
}

# Raw 4-open TDM view for route slaves (omit `channels 4` if `aplay -D drivers` proves single-channel only).
pcm._tas2563_tdm {
	type hw
	card tas2563audio
	device 0
	channels 4
}

pcm.driver_slot0 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas2563_tdm"
		slave.channels 4
		ttable.0.0 1
	}
}

pcm.driver_slot1 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas2563_tdm"
		slave.channels 4
		ttable.0.1 1
	}
}

pcm.driver_slots_lr {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas2563_tdm"
		slave.channels 4
		ttable.0.0 1
		ttable.1.1 1
	}
}

pcm.driver_speaker {
	type plug
	slave.pcm "drivers"
}

# ── TAC5301 (`audio_loop` / `aux`) — tac5301codec
#
#   simple-audio-card,name = "tac5301-codec" → short ALSA card id tac5301codec
#   Playback (loop output): aplay -D audio_loop …
#   Capture (reserved aux input): arecord -D aux …       # wrong direction rejected by asym helper
#

pcm._tac5301_hw {
	type hw
	card tac5301codec
	device 0
}

pcm.audio_loop {
	type asym
	playback.pcm {
		type plug
		slave.pcm "_tac5301_hw"
	}
	capture.pcm "null"
}

pcm.aux {
	type asym
	playback.pcm "null"
	capture.pcm {
		type plug
		slave.pcm "_tac5301_hw"
	}
}

ctl.audio_loop {
	type hw
	card tac5301codec
}

ctl.aux {
	type hw
	card tac5301codec
}

# ── TAA5412 (“Driver Mic”) — taa5412codec  (PCM6240 / snd_soc_pcm6240; MACHINE_FEATURES taa5412 + firmware blob)
#
#   simple-audio-card,name = "taa5412-codec" → short id taa5412codec
#   Product: driver-facing cab mic — capture only: arecord -D driver_mic …
#

pcm._taa5412_hw {
	type hw
	card taa5412codec
	device 0
}

pcm.driver_mic {
	type asym
	playback.pcm "null"
	capture.pcm {
		type plug
		slave.pcm "_taa5412_hw"
	}
}

ctl.driver_mic {
	type hw
	card taa5412codec
}

# ── TAS6424 (`tannoy_*`) — tas6424classd
#
# DT510 — TAS6424 class-D; ALSA card short id: tas6424classd
#
# IEC slots 2–3 = Tannoy pair on this board; 0–1 unused (no PCMs for 0–1).
#
#   aplay -D tannoy_slot2 / aplay -D tannoy_slot3   # one Tannoy each
#   aplay -D tannoy_both_mono | tannoy_both_lr       # both Tannoys (mono dup / stereo L→2 R→3)
#   aplay -D tannoy_all                             # mono → all four IEC slots (incl. 0–1; lab only)
#   aplay -D tannoys                                 # raw 4-open hw
#   amixer -D tannoys …                              # TI mixer control names

pcm.tannoys {
	type hw
	card tas6424classd
	device 0
}

ctl.tannoys {
	type hw
	card tas6424classd
}

pcm._tas6424_quad {
	type hw
	card tas6424classd
	device 0
	channels 4
}

pcm.tannoy_slot2 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.2 1
	}
}

pcm.tannoy_slot3 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.3 1
	}
}

pcm.tannoy_all {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.0 1
		ttable.0.1 1
		ttable.0.2 1
		ttable.0.3 1
	}
}

pcm.tannoy_both_mono {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.2 1
		ttable.0.3 1
	}
}

pcm.tannoy_both_lr {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.2 1
		ttable.1.3 1
	}
}
