# DT510 — TAS6424 class-D; ALSA card short id: tas6424classd
#
# IEC slots 2–3 = Tannoy pair on this board; 0–1 unused (no PCMs for 0–1).
#
#   aplay -D tannoy_slot2 / aplay -D tannoy_slot3   # one Tannoy each
#   aplay -D tannoy_both_mono | tannoy_both_lr       # both Tannoys (mono dup / stereo L→2 R→3)
#   aplay -D tannoy_all                             # mono → all four IEC slots (incl. 0–1; lab only)
#   aplay -D tannoys                                 # raw 4-open hw
#   amixer -D tannoys …                              # TI mixer control names

pcm.tannoys {
	type hw
	card tas6424classd
	device 0
}

ctl.tannoys {
	type hw
	card tas6424classd
}

pcm._tas6424_quad {
	type hw
	card tas6424classd
	device 0
	channels 4
}

pcm.tannoy_slot2 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.2 1
	}
}

pcm.tannoy_slot3 {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.3 1
	}
}

pcm.tannoy_all {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.0 1
		ttable.0.1 1
		ttable.0.2 1
		ttable.0.3 1
	}
}

pcm.tannoy_both_mono {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.2 1
		ttable.0.3 1
	}
}

pcm.tannoy_both_lr {
	type plug
	slave.pcm {
		type route
		slave.pcm "_tas6424_quad"
		slave.channels 4
		ttable.0.2 1
		ttable.1.3 1
	}
}
