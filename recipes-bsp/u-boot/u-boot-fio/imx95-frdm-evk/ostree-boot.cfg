# Foundries OSTree boot for imx95-frdm-evk (mirrors imx8mm-lpddr4-evk lmp.cfg pattern).
#
# u-boot-ostree-scr-fit builds boot.itb; uboot-fitimage embeds it in u-boot.itb and SPL
# preloads it to BOOTSCR_LOAD_ADDR (0x83500000). Autoboot must source that script, not
# NXP bsp_bootcmd (boot.scr + Image on VFAT — absent on sota WIC).
#
# boot.itb also lands on VFAT p1 for OSTree boot-script updates; interim manual boot
# can fatload boot.itb from mmc 0:1 and "bootm ${loadaddr}" if SPL preload is missing.

CONFIG_USE_BOOTCOMMAND=y
CONFIG_BOOTCOMMAND="setenv verify 1; source 0x83500000; reset"
