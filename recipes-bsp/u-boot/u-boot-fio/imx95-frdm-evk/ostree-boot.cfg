# Foundries OSTree boot for imx95-frdm-evk.
#
# Load boot.itb from VFAT p1 and bootm. SPL may also preload the embedded boot.itb from
# u-boot.itb to 0x83500000 when lmp-spl-fit.cfg enables CONFIG_SPL_LOAD_FIT; fatload is
# the reliable autoboot path (matches docs/imx95-foundries-emmc.md manual boot).

CONFIG_USE_BOOTCOMMAND=y
CONFIG_BOOTCOMMAND="mmc dev 0; fatload mmc 0:1 ${loadaddr} boot.itb; setenv verify 1; bootm ${loadaddr}; reset"
