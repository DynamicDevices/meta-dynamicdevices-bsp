# Foundries OSTree boot.cmd (@@INCLUDE_COMMON_IMX@@ / boot-header.cmd.in) needs
# fiovb, imx_is_closed, and imx_secondary_boot. meta-lmp has no imx95 lmp.cfg
# (falls back to empty base lmp.cfg), so mirror imx93-11x11-lpddr4x-evk lmp.cfg
# Foundries command wiring here.
#
# imx_is_closed and imx_secondary_boot live in imx_secondary_boot.c (see
# CMD_SECONDARY_BOOT in Kconfig). fiovb needs FIOVB plus OPTEE/TEE prerequisites.

CONFIG_PARTITION_UUIDS=y
CONFIG_TEE=y
CONFIG_OPTEE=y
CONFIG_OPTEE_LIB=y
CONFIG_FIOVB=y
CONFIG_CMD_FIOVB=y
CONFIG_CMD_SECONDARY_BOOT=y
CONFIG_SECONDARY_BOOT_RUNTIME_DETECTION=y
CONFIG_SECONDARY_BOOT_SECTOR_OFFSET=0x0
