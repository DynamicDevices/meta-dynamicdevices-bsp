# FRDM-IMX95: onboard 32 GB eMMC is USDHC1 (U-Boot mmc dev 0, Linux mmcblk0).
# NXP imx95_15x15_frdm_defconfig sets CONFIG_SYS_MMC_ENV_DEV=1 (microSD) for env storage;
# fastboot uses mmc_get_env_dev() which reads mmcdev, defaulting to 1 when unset at USB boot.
# Align default with eMMC-primary boot (boot.cmd devnum 0, emmc_dev=0).
CONFIG_SYS_MMC_ENV_DEV=0
CONFIG_SYS_MMC_ENV_PART=0
