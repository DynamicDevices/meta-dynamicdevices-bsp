# imx95-frdm-evk: Foundries LmP SPL FIT boot (mirrors imx93-11x11-lpddr4x-evk/lmp.cfg).
#
# meta-lmp has no imx95 lmp.cfg (falls back to empty base lmp.cfg), so SPL never loads
# u-boot.itb as a FIT. Without CONFIG_SPL_LOAD_FIT, uboot-fitimage's embedded boot.itb is
# not preloaded to BOOTSCR_LOAD_ADDR (0x83500000) and autoboot "source 0x83500000" aborts.

CONFIG_SPL_FIT=y
CONFIG_SPL_LOAD_FIT=y
# CONFIG_SPL_FIT_IMAGE_TINY is not set
# CONFIG_SPL_LOAD_IMX_CONTAINER is not set
# CONFIG_SPL_BOOTROM_SUPPORT is not set
CONFIG_SPL_ALLOC_BD=y
CONFIG_SPL_OF_CONTROL=y
CONFIG_SPL_CRYPTO=y
CONFIG_SPL_HASH=y
CONFIG_SPL_SHA256=y
CONFIG_SPL_WATCHDOG=y
CONFIG_SPL_MISC=y
CONFIG_SPL_RSA=y
CONFIG_SPL_ATF=y
CONFIG_SPL_MMC=y
CONFIG_SPL_MMC_HS200_SUPPORT=y
# CONFIG_SPL_RAW_IMAGE_SUPPORT is not set
CONFIG_SYS_MMCSD_RAW_MODE_U_BOOT_USE_SECTOR=y
CONFIG_SYS_MMCSD_RAW_MODE_U_BOOT_SECTOR=0x300
CONFIG_HASH=y
# CONFIG_SPL_SHA1 is not set
# CONFIG_SPL_CRC16 is not set
# CONFIG_SPL_CRC32 is not set
# CONFIG_SPL_LEGACY_IMAGE_FORMAT is not set
# CONFIG_SPL_DM_USB is not set
# CONFIG_SPL_EFI_PARTITION is not set
# CONFIG_SPL_PARTITION_UUIDS is not set
# CONFIG_SPL_DOS_PARTITION is not set
# CONFIG_SPL_MXC_OCOTP is not set
# CONFIG_SPL_USB_HOST is not set
# CONFIG_SPL_USB_GADGET is not set
# CONFIG_SPL_USB_SDP_SUPPORT is not set
CONFIG_OF_LIBFDT_OVERLAY=y
CONFIG_LOGLEVEL=3
CONFIG_SUPPORT_EMMC_BOOT=y
CONFIG_ENV_IS_IN_FAT=y
CONFIG_ENV_FAT_INTERFACE="mmc"
CONFIG_ENV_FAT_DEVICE_AND_PART="0:1"
CONFIG_ENV_SIZE=0x4000
CONFIG_CMD_IMPORTENV=y
CONFIG_CMD_EDITENV=y
CONFIG_CMD_SAVEENV=y
CONFIG_CMD_XIMG=y
CONFIG_IMX_CONFIG=""
CONFIG_LTO=y
