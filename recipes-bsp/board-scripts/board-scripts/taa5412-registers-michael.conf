# TAA5412-Q1 — Michael register dump (TI `w` script format).
#
# I2C address in file: 8-bit write `a6` (= 7-bit 0x53). DT510 uses 7-bit 0x51
# (8-bit write 0xa2 / read 0xa3). Apply with -a 0x51 so writes hit the board;
# file addr is ignored (warns if it differs from target).
#
# Format:  w <i2c_8bit_addr> <reg_hex> <val_hex>   (# comments OK)
# Page select: reg 0x00 ← page number; other regs are byte offsets on that page.
# Regmap linear (driver): (page * 128) + reg_offset.
#
# Apply (driver bound — no unbind):
#   sudo dt510-taa5412-i2c-registers-apply.sh -f taa5412-registers-michael.conf -a 0x51 --verify
#
# Record driver mic — see dt510-taa5412-i2c-registers-apply.sh header cheat sheet.

# CHECKSUM 0
# Page 0 (0x00) Dump
w a6 00 00
w a6 7f 00
w a6 00 00
w a6 02 03
# Page 1 (0x01) Dump
w a6 00 01
w a6 73 d0
# Power up/down
w a6 00 00
w a6 78 a0
