# Silicon Labs CP2108 USB–quad-UART bridge (DT510: QUART_RES# on GPIO4_IO5 / SAI1_RXD3).
# Depends on USB_SERIAL; enumerate as /dev/ttyUSB* when connected to USB host port.
CONFIG_USB_SERIAL=m
CONFIG_USB_SERIAL_CP210X=m
# USB_SERIAL_CONSOLE requires CONFIG_USB_SERIAL=y (built-in core). imx defconfig often enables
# CONFIG_USB_SERIAL_CONSOLE=y; with USB_SERIAL=m that symbol cannot apply — silence configcheck:
# CONFIG_USB_SERIAL_CONSOLE is not set
