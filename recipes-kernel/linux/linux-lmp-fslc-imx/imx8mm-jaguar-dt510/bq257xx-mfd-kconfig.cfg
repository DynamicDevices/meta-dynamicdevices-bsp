# Applied when MACHINE_FEATURES contains bq25792-charger (see linux-lmp-fslc-imx bbappend).
# Enables TI BQ257XX MFD from 0010-mfd-bq257xx-add-bq25703a-core-fslc.patch.
# This MFD probe matches ti,bq25703a only; imx8mm-jaguar-dt510.dts uses ti,bq25792 — the
# chip will not bind until OF match / BQ25792 support is added. Safe preparatory build.
# Charger / regulator platform drivers are not in linux-fslc 6.6 yet — add with further patches.
CONFIG_MFD_BQ257XX=m
