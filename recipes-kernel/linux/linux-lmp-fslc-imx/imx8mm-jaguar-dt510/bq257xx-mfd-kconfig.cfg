# Applied when MACHINE_FEATURES contains bq25792-charger (see linux-lmp-fslc-imx bbappend).
# Patches 0010 (MFD) + 0011 (charger) + 0012 (regulator) — mainline BQ25703A stack for linux-fslc 6.6.
# BQ25792 silicon uses a different register map than BQ25703A (TI SLUSDG1C Table 9-12). Until 0013+
# (lore BQ25792 series: bq257xx.h + mfd/charger/regulator variant + binding), do not treat this
# stack as correct for ti,bq25792 on hardware — OF match and regmap still target BQ25703A only.
# Next: import [PATCH v6 xx/11] BQ25792 variant when mbox/branch is available.
CONFIG_MFD_BQ257XX=m
CONFIG_CHARGER_BQ257XX=m
CONFIG_REGULATOR_BQ257XX=m
