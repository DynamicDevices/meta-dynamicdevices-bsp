# DT510: KSZ9896 — management strapped MIIM (MDC+MDIO), not I2C/SPI on those pins.
# Mainline DSA (ksz9477) regmap is I2C or SPI only — no ksz module binds via FEC MDIO today.
# Keep DSA/bridge options if you add another switch later; disable Microchip KSZ until I2C/SPI or an out-of-tree path matches HW.
CONFIG_BRIDGE=y
CONFIG_NET_DSA=y
# CONFIG_NET_DSA_MICROCHIP_KSZ_COMMON is not set
# CONFIG_NET_DSA_MICROCHIP_KSZ9477_I2C is not set
