# TAC5x1x (TI TAC5301-Q1 path) — mainline series [PATCH v1 0/8] linux-sound
# Message-ID base: 20260312184833.263-*-niranjan.hy@ti.com
# Fetch: from repo root, run:  ./scripts/kernel-fetch-tac5x1x-lore-series.sh
# Apply (clean linux git tree):  ./scripts/kernel-am-tac5x1x-lore-series.sh /path/to/linux
#
# Patch index (why “stuck on patch 6”): BSP may only ship 01–05; 06–08 must be fetched.
#   file prefix   lore id   cover [N/8]
#   01-...263-2   263-2     [1/8]  dt-bindings mfd
#   02-...263-3   263-3     [2/8]  dt-bindings pinctrl
#   03-...263-4   263-4     [3/8]  dt-bindings sound (codec)
#   04-...263-5   263-5     [4/8]  dt-bindings pcm6240 yaml — NOT applied on linux-lmp-fslc-imx:
#        tree has no Documentation/devicetree/bindings/sound/ti,pcm6240.yaml (kernel-meta apply fails).
#        Patch kept in patches/ as reference; bindings-only, skipping is safe for runtime.
#   05-...263-6   263-6     [5/8]  mfd tac5x1x core driver
#   06-...263-7   263-7     [6/8]  pinctrl driver (first often missing if yhbt drops mid-series)
#   07-...263-8   263-8     [7/8]  ASoC codec driver (Kconfig + tac5x1x.c/h only; Makefile hunks removed
#        from the mbox so "git am" succeeds — FSLC uses snd-soc-*-objs and tab/spacing differs.)
#   07a-...makefile-objs / 07b-...makefile-obj — append after 07: two single-hunk patches for
#        sound/soc/codecs/Makefile (objs line + obj-$(CONFIG_...) line) on linux-fslc @ SRCREV.
#   08-...linux-6.6-fslc-compat — after 07b: Lore expects newer APIs (array_size.h, regmap_multi_reg_read
#        since 6.11, snd_soc_component_to_dapm, void platform remove). Align for linux-fslc 6.6.y build.
#        irq_thread_func: regmap_read loop uses one unsigned int val at function scope (strict ISO C / -Wdeclaration-after-statement).
#   10-dt510-tac5301-analog-dt-defaults — after 09: MFD probe honors ti,adc1-single-ended /
#        ti,out1-mono-se-out1p on tac5301@50 (P0 R0x50 / R0x64 field values per DT510 analog).
#   09-...pinctrl-gpiochip-6.6-compat — after 08: pinctrl_gpio_direction_* (chip,offset) vs global gpio number;
#        gpio_chip.set returns void on 6.6; devm_pinctrl_register wants mutable pinctrl_desc (no const).
#   08-...263-9   263-9     [8/8]  pcm6240 — NOT applied on linux-lmp-fslc-imx @ SRCREV_machine:
#        no sound/soc/codecs/pcm6240.c in Freescale/linux-fslc at that pin (patch edits that file).
#        Kept in patches/ as reference. TAC5301 uses tac5x1x + DT, not legacy pcm6240 probe path here.
# If yhbt times out, re-run fetch (resume skips valid files), increase TAC5X1X_FETCH_RETRIES,
# or copy raw mboxes from another network / browser save-as from yhbt lore pages.
#
# If "git am" fails with: cannot convert from yes to UTF-8 — re-run fetch script
# (normalizes charset="yes" in mbox) or: sed -i 's/charset="yes"/charset="UTF-8"/g' *.patch
#
# Baseline: use the same commit as linux-lmp-fslc-imx SRCREV (bitbake -e linux-imx | grep ^SRCREV).
# Smoke-tested on linux-stable v6.6.52: lore [1/8][2/8] apply clean after charset fix.
# Then backport patches onto the exact linux-lmp-fslc-imx SRCREV; add them to
# linux-lmp-fslc-imx_%.bbappend under MACHINE_FEATURES tac5x1x-audio (same style
# as bq25792-charger). Upstream Lore is [1/8]..[8/8]; BSP applies 01–03, 05–07, 07a–07b, 08–09 (04/08 skipped on fslc).
#
# Expected Kconfig symbols from that series (names may change if a v2 lands):
#   CONFIG_MFD_TAC5X1X=m
#   CONFIG_PINCTRL_TI_TAC5X1X=m
#   CONFIG_SND_SOC_TAC5X1X=m
#
# Applied via SRC_URI when MACHINE_FEATURES contains tac5x1x-audio (see linux-lmp-fslc-imx bbappend).
CONFIG_MFD_TAC5X1X=m
CONFIG_PINCTRL_TI_TAC5X1X=m
CONFIG_SND_SOC_TAC5X1X=m
