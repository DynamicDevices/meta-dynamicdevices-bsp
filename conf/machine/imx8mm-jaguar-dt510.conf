#@TYPE: Machine
#@NAME: Dynamic Devices i.MX 8M Mini Jaguar DT510 board with LPDDR4
#@SOC: i.MX8MM
#@DESCRIPTION: Machine configuration for Dynamic Devices i.MX 8M Mini Jaguar DT510 board with LPDDR4
#@MAINTAINER: Alex J Lennon  <ajlennon@dynamicdevices.co.uk>

MACHINEOVERRIDES =. "imx8mm-lpddr4-evk:"

require conf/machine/imx8mm-lpddr4-evk.conf
require conf/machine/include/mcuboot-pmu-vars.inc
require conf/machine/include/mcumgr.inc
require conf/machine/include/tas2562.inc
require conf/machine/include/tas2563.inc
require conf/machine/include/ksz9896.inc
require conf/machine/include/cp2108-usb-serial.inc
require conf/machine/include/mcp251xfd-can.inc
require conf/machine/include/tac5x1x.inc

KMACHINE = "imx8mmevk"
# mlan then moal — same order as imx93-jaguar-eink / NXP MOAL README for IW612 SDIO
KERNEL_MODULE_AUTOLOAD:imx8mm-jaguar-dt510 = " i2c-dev spidev snd-aloop mlan moal"

MACHINE_FEATURES:remove:imx8mm-jaguar-dt510 = " nxp8987-sdio"

# Need to remove nxpiw612 to build SDK as for some reason it errors with a conflict with linux-firmware
# TODO: DT510 will use ublox MAYA-W2 WiFi module (IW612 chipset) - same as eink board
# For now using sentai WiFi configuration for demo purposes only - will be updated when new hardware arrives
# STUSB4500 / USB-C PD: not populated on DT510 (hardware; Sentai carries STUSB4500).
# tas6424: Tier C2 class-D on SAI1 — kernel SND_SOC_TAS6424 (see linux-lmp-fslc-imx bbappend)
# bq25792-charger: bq25792-charger.cfg + kernel patches 0010-mfd-bq257xx-*.patch + bq257xx-mfd-kconfig.cfg.
# To disable: MACHINE_FEATURES:remove:imx8mm-jaguar-dt510 = " bq25792-charger"
# cp2108-usb-serial: CONFIG_USB_SERIAL_CP210X — see cp2108-usb-serial.inc.
# To disable: MACHINE_FEATURES:remove:imx8mm-jaguar-dt510 = " cp2108-usb-serial"
# mcp251xfd-can: SocketCAN MCP251xFD — see mcp251xfd-can.inc.
# To disable: MACHINE_FEATURES:remove:imx8mm-jaguar-dt510 = " mcp251xfd-can"
# ksz9896: KSZ9896 DSA switch — CONFIG fragments from imx8mm-jaguar-dt510/ksz9896-*.cfg (see ksz9896.inc).
# To disable: MACHINE_FEATURES:remove:imx8mm-jaguar-dt510 = " ksz9896"
# tas2563: TAS2563 smart amp — tas2562-audio-codec.cfg + tas2781/tas2563 patches + tas2562-driver.cfg (see tas2563.inc).
# To disable: MACHINE_FEATURES:remove:imx8mm-jaguar-dt510 = " tas2563"
# tac5x1x-audio: TAC5x1x lore series + tac5x1x-lmp.cfg — see tac5x1x.inc and tac5x1x-lmp/patches/
# taa5412: TI TAA5412 (`ti,taa5412`) via mainline PCM6240 driver — `pcm6240-lmp/0001-*.patch` + `pcm6240-audio-codec.cfg` (see `linux-lmp-fslc-imx_%.bbappend`).
# To disable: MACHINE_FEATURES:remove:imx8mm-jaguar-dt510 = " taa5412"
# auracast: LE Audio / BAP broadcast host (PipeWire + WirePlumber + BlueZ roles) per NXP UM12155 — `lmp-feature-le-audio.inc`.
#           Requires nxpiw612-sdio (IW612). Enabled on this factory line; to drop LE Audio stack from the image:
# MACHINE_FEATURES:remove:imx8mm-jaguar-dt510 = " auracast"
# dt510-digital-io: board-scripts DIO toggle helpers + pulls libgpiod-tools (see board-scripts_1.0.bb).
# MACHINE_FEATURES:remove:imx8mm-jaguar-dt510 = " dt510-digital-io"
# Optional: also expose DISTRO_FEATURES to recipes that only key on distro flags:
# DISTRO_FEATURES:append:imx8mm-jaguar-dt510 = "${@bb.utils.contains('MACHINE_FEATURES', 'auracast', ' auracast', '', d)}"
# mcuboot: companion PMU MCU (MCUboot in rootfs via lmp-feature-mcuboot / packagegroup-mcuboot).
# imx93 Jaguar E-Ink left mcuboot MACHINE_FEATURE disabled historically (GitHub issue #22 U-Boot SPL size);
# imx8MM DT510 SPL budget may differ — if factory image overflows SPL, revisit this MACHINE_FEATURE.
# mcumgr: MCUmgr CLI on the AP — program the PMU Zephyr app over UART (mcumgr-setup / image upload / reset).
# Distinct from J-Link raw flash of bootloader bins; set /dev/tty* and baud per DT510 hardware SSOT.
MACHINE_FEATURES:append:imx8mm-jaguar-dt510 = " nxpiw612-sdio zigbee tas2563 tas6424 bq25792-charger ksz9896 cp2108-usb-serial mcp251xfd-can tac5x1x-audio taa5412 auracast dt510-digital-io mcuboot mcumgr"

# USB dual UAC2 gadget (simulated / lab path): optional autostart of usb-dual-audio-gadget-dt510.service.
# Enable lab autostart with: MACHINE_FEATURES:append:imx8mm-jaguar-dt510 = " dt510-usb-dual-audio-autostart"
# Scripts stay installed; manual: systemctl start usb-dual-audio-gadget-dt510

#SKIP_RECIPE[linux-firmware] = "linux-firmware is blacklisted"

# NOTE: This is *not* used for the lmp DISTRO / CI. This is just included for local development with lmp-base
KERNEL_DEVICETREE:append:imx8mm-jaguar-dt510 = " imx8mm-jaguar-dt510.dtb"

# Fix imx-vpu-hantro build failure
TOOLCHAIN:pn-imx-vpu-hantro = "gcc"
TOOLCHAIN:pn-imx-vpu-hantro-daemon = "gcc"

# Fix nxp-afe* build failure
TOOLCHAIN:pn-nxp-afe = "gcc"
TOOLCHAIN:pn-nxp-afe-voiceseeker = "gcc"

# Need to have a larger SPI buffer for SPINEL protocol (Zigbee/OpenThread)
KERNEL_MODULE_PROBECONF:append:imx8mm-jaguar-dt510 = " spidev moal"
module_conf_spidev = "options spidev bufsiz=32768"
# MOAL loads IW612 firmware using paths in /lib/firmware/nxp/wifi_mod_para.conf (SDIW612 fw_name).
# Do NOT set fw_name here: firmware-nxp-wifi bbappend toggles .bin vs .bin.se via NXP_WIFI_INSECURE_FIRMWARE;
# a modprobe fw_name that disagrees with the file on disk causes request_firmware to fail even when mlan/moal load.
# For verbose firmware/download logs: drvdbg=2 (then set back to 0 for production).
module_conf_moal = "options moal drvdbg=0"

# Ship SDIO WiFi firmware blobs (IW612). Without this package the rootfs may lack nxp/*.bin[.se] and moal/mlan never attach.
MACHINE_EXTRA_RDEPENDS:append:imx8mm-jaguar-dt510 = " firmware-nxp-wifi-nxpiw612-sdio"
# TAA5412 (PCM6240): driver requests /lib/firmware/taa5412-i2c-1-1dev.bin — vendored blob + recipes-kernel/firmware/firmware-taa5412/.
MACHINE_EXTRA_RDEPENDS:append:imx8mm-jaguar-dt510 = "${@bb.utils.contains('MACHINE_FEATURES', 'taa5412', ' firmware-taa5412', '', d)}"
# dt510-router — NM WAN (lan1) + LAN bridge + DHCP/NAT on br-lan (lan2–lan4). Disabled until re-enabled for field testing.
# MACHINE_EXTRA_RDEPENDS:append:imx8mm-jaguar-dt510 = " dt510-router"

# USB Gadget support - disabled to prevent automatic startup
# MACHINE_EXTRA_RDEPENDS:append:imx8mm-jaguar-dt510 = " usb-composite-gadget"

# Secure boot SE050 into OpTee (disabled for local development builds)
MACHINE_FEATURES:append:imx8mm-jaguar-dt510 = "${@'' if d.getVar('LOCAL_DEVELOPMENT_BUILD') == '1' else ' se05x'}"
# TODO: This line doesn't appear to take effect so overriding it in the OpTee recipe for now
SE05X_OEFID:imx8mm-jaguar-dt510 = "0xA200"

SERIAL_CONSOLES = "115200:ttyUSBConsole"