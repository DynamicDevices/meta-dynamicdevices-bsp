#@TYPE: Machine
#@NAME: NXP i.MX 95 15x15 FRDM with LPDDR4x
#@SOC: i.MX95
#@DESCRIPTION: Machine configuration for NXP i.MX 95 15x15 FRDM with LPDDR4x
##@MAINTAINER: Jun Zhu <junzhu@nxp.com>

MACHINEOVERRIDES =. "mx95:"

require conf/machine/include/imx95-evk.inc

KERNEL_DEVICETREE_BASENAME = "imx95-15x15-frdm"

# Hat/overlay DTBs are not in linux-lmp-fslc-imx 6.6.52 yet; add back when DTS land upstream.
KERNEL_DEVICETREE:append:use-nxp-bsp = " \
    freescale/${KERNEL_DEVICETREE_BASENAME}.dtb \
"

# scarthgap meta-imx imx95-evk.inc: UBOOT_CONFIG[sd] = "${BASENAME}_evk_defconfig"
# u-boot-imx lf_v2024.04 (LmP imx95 BSP): imx95_15x15_evk_defconfig only — no FRDM defconfig yet
# (imx95_15x15_frdm_defconfig is in uboot-imx lf_v2025.04+). Kernel/OSTree DTB stays imx95-15x15-frdm.
UBOOT_CONFIG_BASENAME = "imx95_15x15"

IMXBOOT_TARGETS_BASENAME = "flash"

OEI_BOARD  = "mx95lp4x-15"
DDR_TYPE   = "lpddr4x"

# imx-system-manager deploy: imx-sm outputs build/${SYSTEM_MANAGER_CONFIG}/m33_image.bin
SYSTEM_MANAGER_FIRMWARE_BASENAME = "m33_image"
SYSTEM_MANAGER_FIRMWARE_NAME = "${SYSTEM_MANAGER_FIRMWARE_BASENAME}-${SYSTEM_MANAGER_CONFIG}"
DDR_FIRMWARE_NAME = " \
    lpddr4x_dmem_v202409.bin \
    lpddr4x_dmem_qb_v202409.bin \
    lpddr4x_imem_v202409.bin \
    lpddr4x_imem_qb_v202409.bin \
"
OEI_DDR_CONFIG     = "MIMX95_LPDDR4X_EVK_15X15_4000MTS_FW2024.09_timing"
OEI_DDR_CONFIG_ECC = "MIMX95_LPDDR4X_EVK_15X15_4000MTS_FW2024.09_ECC_enabled_timing"

M4_DEFAULT_IMAGE_MX95 = "imx95-15x15-evk_m7_TCM_power_mode_switch.bin"

IMAGE_BOOT_FILES:append = " \
    mcore-demos/imx95-15x15-evk_m7_TCM_hello_world.bin \
    mcore-demos/imx95-15x15-evk_m7_TCM_power_mode_switch.bin \
    mcore-demos/imx95-15x15-evk_m7_TCM_rpmsg_lite_pingpong_rtos_linux_remote.bin \
    mcore-demos/imx95-15x15-evk_m7_TCM_rpmsg_lite_str_echo_rtos.bin \
    mcore-demos/imx95-15x15-evk_m7_TCM_sai_low_power_audio.bin \
"
