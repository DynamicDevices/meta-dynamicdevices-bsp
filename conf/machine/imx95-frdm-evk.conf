#@TYPE: Machine
#@NAME: Dynamic Devices FRDM-IMX95 (NXP i.MX95 FRDM EVK)
#@SOC: i.MX95
#@DESCRIPTION: Machine configuration for NXP FRDM-IMX95, based on imx95-15x15-lpddr4x-frdm
#@MAINTAINER: Alex J Lennon <ajlennon@dynamicdevices.co.uk>

MACHINEOVERRIDES =. "imx95-15x15-lpddr4x-frdm:"

require conf/machine/imx95-15x15-lpddr4x-frdm.conf

KMACHINE = "imx95-15x15-lpddr4x-frdm"

# Base DTB from NXP BSP (imx95-15x15-frdm.dtb). Append a custom DTB here when available.
# KERNEL_DEVICETREE:append:imx95-frdm-evk = " freescale/imx95-frdm-evk.dtb"

# FRDM-IMX95 Getting Started guide uses USB serial console on the debug port.
SERIAL_CONSOLES = "115200:ttyUSBConsole"

# OSTree: kernel cmdline (ttyLP0 = SoC UART behind USB debug bridge; see imx93-11x11 LmP default)
OSTREE_KERNEL_ARGS:imx95-frdm-evk ?= "console=tty1 console=ttyLP0,115200 earlycon rootfstype=ext4 rw rootwait loglevel=4 rootflags=noatime"
OSTREE_BOOTLOADER_EXTRA_CONFIG:imx95-frdm-evk = "bootdelay=1"

# No on-board IW612 (MAYA W2 class); keep NXP generic wifi/bluetooth/pcie/sdio from imx95-evk.inc.
# touchscreen + screen: keep from imx-base.inc (display/touch bring-up on FRDM).
MACHINE_FEATURES:remove:imx95-frdm-evk = " nxpiw612-sdio"

# LmP imx9: FSLC+NXP kernel (not generic linux-lmp); see lmp-machine-custom.inc mx93-nxp-bsp
PREFERRED_PROVIDER_virtual/kernel:mx95-nxp-bsp = "linux-lmp-fslc-imx"

# imx9 OP-TEE: NXP-aligned Foundries fork (see lmp-machine-custom.inc imx93 mx93-nxp-bsp)
PREFERRED_VERSION_optee-os-fio:mx95-nxp-bsp = "4.4.0-imx"
PREFERRED_VERSION_optee-os-fio-mfgtool:mx95-nxp-bsp = "4.4.0-imx"
PREFERRED_VERSION_optee-os-tadevkit:mx95-nxp-bsp = "4.4.0-imx"

# Same imx9-family workarounds as imx93-jaguar-eink (preempt CI failures)
TOOLCHAIN:pn-imx-vpu-hantro = "gcc"
TOOLCHAIN:pn-imx-vpu-hantro-daemon = "gcc"
TOOLCHAIN:pn-nxp-afe = "gcc"
TOOLCHAIN:pn-nxp-afe-voiceseeker = "gcc"
