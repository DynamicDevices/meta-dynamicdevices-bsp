#@TYPE: Machine
#@NAME: Dynamic Devices FRDM-IMX95 (NXP i.MX95 FRDM EVK)
#@SOC: i.MX95
#@DESCRIPTION: Machine configuration for NXP FRDM-IMX95, based on imx95-15x15-lpddr4x-frdm
#@MAINTAINER: Alex J Lennon <ajlennon@dynamicdevices.co.uk>

MACHINEOVERRIDES =. "imx95-15x15-lpddr4x-frdm:"

require conf/machine/imx95-15x15-lpddr4x-frdm.conf

KMACHINE = "imx95-15x15-lpddr4x-frdm"

# Base DTB from NXP BSP (imx95-15x15-frdm.dtb). Append a custom DTB here when available.
# KERNEL_DEVICETREE:append:imx95-frdm-evk = " freescale/imx95-frdm-evk.dtb"

# FRDM-IMX95 Getting Started guide uses USB serial console on the debug port.
SERIAL_CONSOLES = "115200:ttyUSBConsole"

# OSTree: kernel cmdline (ttyLP0 = SoC UART behind USB debug bridge; see imx93-11x11 LmP default)
OSTREE_KERNEL_ARGS:imx95-frdm-evk ?= "console=tty1 console=ttyLP0,115200 earlycon rootfstype=ext4 rw rootwait loglevel=4 rootflags=noatime"
OSTREE_BOOTLOADER_EXTRA_CONFIG:imx95-frdm-evk = "bootdelay=1"

# No on-board IW612 (MAYA W2 class); keep NXP generic wifi/bluetooth/pcie/sdio from imx95-evk.inc.
# touchscreen + screen: keep from imx-base.inc (display/touch bring-up on FRDM).
MACHINE_FEATURES:remove:imx95-frdm-evk = " nxpiw612-sdio"

# LmP imx9: FSLC+NXP kernel (not generic linux-lmp); see lmp-machine-custom.inc mx93-nxp-bsp
PREFERRED_PROVIDER_virtual/kernel:mx95-nxp-bsp = "linux-lmp-fslc-imx"

# imx9 OP-TEE: NXP-aligned Foundries fork (see lmp-machine-custom.inc imx93 mx93-nxp-bsp)
PREFERRED_VERSION_optee-os-fio:mx95-nxp-bsp = "4.4.0-imx"
PREFERRED_VERSION_optee-os-fio-mfgtool:mx95-nxp-bsp = "4.4.0-imx"
PREFERRED_VERSION_optee-os-tadevkit:mx95-nxp-bsp = "4.4.0-imx"

# meta-lmp lmp-machine-custom / lmp-mfgtool-machine-custom cover imx93 only; mx95 needs
# u-boot-fio + uboot-fitimage so mfgtool-files can deploy u-boot.itb (not u-boot-imx).
IMX_DEFAULT_BOOTLOADER:mx95-generic-bsp ?= "u-boot-fio"
IMX_DEFAULT_BOOTLOADER:mx95-generic-bsp:lmp-mfgtool ?= "u-boot-fio-mfgtool"
PREFERRED_PROVIDER_virtual/bootloader:mx95-nxp-bsp:lmp-mfgtool ?= "u-boot-fio-mfgtool"
IMX_DEFAULT_BOOTLOADER:imx95-frdm-evk:lmp-mfgtool = "u-boot-fio-mfgtool"
PREFERRED_PROVIDER_virtual/bootloader:imx95-frdm-evk:lmp-mfgtool = "u-boot-fio-mfgtool"
# Foundries (sota) boot: u-boot-ostree-scr-fit compiles boot.cmd -> boot.itb on VFAT /boot;
# kernel + DTB are loaded from the OSTree deployment on the rootfs (not from /boot).
# meta-lmp has no mx95 entries, so mirror the proven mx93-generic-bsp sota wiring. The plain
# IMAGE_BOOT_FILES below is for non-sota/local builds; :sota overrides win on Foundries.
# (Target 2707 had only tee.bin + dtb on p1 because boot.itb / WKS_FILE:sota were missing.)
WKS_FILE:sota:imx95-frdm-evk = "emmc-imx-gpt-sota.wks"
IMAGE_BOOT_FILES:mx95-generic-bsp = "${KERNEL_IMAGETYPE} ${@make_dtb_boot_files(d)} boot.scr uEnv.txt"
IMAGE_BOOT_FILES:sota:imx95-frdm-evk = "boot.itb"
IMAGE_BOOT_FILES:mx95-nxp-bsp:lmp-mfgtool = "imx-boot u-boot.itb boot.itb"
KERNEL_IMAGETYPE:sota:mx95-generic-bsp = "fitImage"
KERNEL_CLASSES:sota:mx95-generic-bsp = " kernel-lmp-fitimage "
SOTA_CLIENT_FEATURES:append:mx95-generic-bsp = " ubootenv"
UBOOT_CLASSES:mx95-generic-bsp = "uboot-fitimage"
EXTRA_IMAGEDEPENDS:append:mx95-generic-bsp = " virtual/trusted-firmware-a"
ATF_BINARY:mx95-generic-bsp = "arm-trusted-firmware.bin"
PREFERRED_PROVIDER_virtual/trusted-firmware-a:mx95-nxp-bsp ?= "imx-atf"
UBOOT_ENTRYPOINT:mx95-generic-bsp = "0x80400000"
UBOOT_LOADADDRESS:mx95-generic-bsp = "0x80400000"
UBOOT_DTB_LOADADDRESS:mx95-generic-bsp = "0x83000000"
# U-Boot runtime DTB must match FRDM (not 15x15 EVK adv7535 panel tree — causes
# "invalid device tree", adv7535 probe failures, and mmc0 errors on FRDM).
UBOOT_DTB_NAME:imx95-frdm-evk ?= "imx95-15x15-frdm.dtb"
BOOTSCR_LOAD_ADDR:imx95-frdm-evk = "0x83500000"
UBOOT_SIGN_ENABLE:sota:imx95-frdm-evk ?= "1"
LMP_BOOT_FIRMWARE_FILES:mx95-nxp-bsp = "imx-boot u-boot.itb"
PREFERRED_VERSION_u-boot-fio:mx95-nxp-bsp ?= "imx-2024.04"
PREFERRED_PROVIDER_u-boot-default-script:mx95-generic-bsp = "u-boot-ostree-scr-fit"
PREFERRED_PROVIDER_u-boot-default-script:sota:mx95-generic-bsp = "u-boot-ostree-scr-fit"
PREFERRED_PROVIDER_u-boot-default-script:mx95-generic-bsp:lmp-mfgtool = "u-boot-ostree-scr-fit"
KERNEL_IMAGETYPE:mx95-generic-bsp:lmp-mfgtool = "fitImage"
KERNEL_CLASSES:mx95-generic-bsp:lmp-mfgtool = " kernel-lmp-fitimage "
PREFERRED_VERSION_u-boot-fio-mfgtool:mx95-nxp-bsp ?= "imx-2024.04"
WKS_FILE_DEPENDS:append:mx95-generic-bsp = " u-boot-default-script imx-boot"

# Same imx9-family workarounds as imx93-jaguar-eink (preempt CI failures)
TOOLCHAIN:pn-imx-vpu-hantro = "gcc"
TOOLCHAIN:pn-imx-vpu-hantro-daemon = "gcc"
TOOLCHAIN:pn-nxp-afe = "gcc"
TOOLCHAIN:pn-nxp-afe-voiceseeker = "gcc"
