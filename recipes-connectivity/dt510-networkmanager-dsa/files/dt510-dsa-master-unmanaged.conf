# DT510 — KSZ9896 DSA: end0 is the CPU/master netdev toward the switch fabric.
# DHCP on end0 usually fails (no carrier / wrong datapath vs front-panel ports).
# User ports are lan1–lan4; Foundries.io / fioctl need DHCP on the port with link — default lan1.
[device]
match-device=interface-name:end0
managed=false
